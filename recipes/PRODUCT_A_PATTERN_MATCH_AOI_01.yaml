recipe_name: "PRODUCT_A_PATTERN_MATCH_AOI_01"
product_id: "PRODUCT_A"
machine_id: "AOI_01"
version: "0.1.0"

assets:
  template_picture: ""

tile:
  mode: "pattern_match"
  pattern_match:
    template_path: ""
    match_threshold: 0.8
    max_count: 999
    nms_threshold: 0.3
    crop_padding: 8
    sort_row_tolerance: 20

decision:
  mode: "all_detectors_must_pass"
  important_detectors:
    - "999"
  max_ng_count: 0

detectors:
  "999":
    enabled: true
    display_name: "Dark / bright blob detector"
    params:
      threshold: 45
      min_area: 20
      max_area: 5000
      blur_size: 3
      invert: false
      clahe_enabled: true

output:
  save_overlay: true
  save_ng_tiles: true
  save_csv: true
  save_json: true
