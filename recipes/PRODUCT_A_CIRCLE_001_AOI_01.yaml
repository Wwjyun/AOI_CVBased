recipe_name: "PRODUCT_A_CIRCLE_001_AOI_01"
product_id: "PRODUCT_A"
machine_id: "AOI_01"
version: "0.1.0"

tile:
  mode: "grid"
  width: 512
  height: 512
  overlap_x: 64
  overlap_y: 64

decision:
  mode: "all_detectors_must_pass"
  important_detectors:
    - "001"
  max_ng_count: 0

detectors:
  "001":
    enabled: true
    display_name: "Circle threshold NG detector"
    params:
      threshold_method: "adaptive_mean"
      threshold: 128
      max_value: 255
      invert: false
      adaptive_block_size: 31
      adaptive_c: -10.0
      canny_low: 128
      canny_high: 200
      blur_size: 20
      contour_mode: "external"
      morph_operation: "none"
      morph_kernel: 3
      morph_iterations: 1
      process_scale: 1.0
      min_area: 0
      max_area: 0
      min_radius: 0
      max_radius: 0
      min_circularity: 0.70
      min_fill_ratio: 0.55

output:
  save_overlay: true
  save_ng_tiles: true
  save_csv: true
  save_json: true
