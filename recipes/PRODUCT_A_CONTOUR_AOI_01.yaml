recipe_name: "PRODUCT_A_CONTOUR_AOI_01"
product_id: "PRODUCT_A"
machine_id: "AOI_01"
version: "0.1.0"

tile:
  mode: "contour"
  threshold:
    method: "adaptive_gaussian"
    threshold: 128
    max_value: 255
    invert: true
    adaptive_block_size: 41
    adaptive_c: 7
    blur_size: 3
    morph_open_kernel: 3
    morph_open_iterations: 1
    morph_close_kernel: 5
    morph_close_iterations: 1
  shapes:
    enabled_shapes:
      - "rectangle"
      - "circle"
      - "polygon"
    min_area: 200
    max_area: 300000
    min_width: 12
    max_width: 1600
    min_height: 12
    max_height: 1600
    min_aspect_ratio: 0
    max_aspect_ratio: 25
    min_radius: 6
    max_radius: 800
    min_circularity: 0.72
    polygon_min_vertices: 3
    polygon_max_vertices: 16
    approx_epsilon_ratio: 0.02
    subpixel_enabled: true
    subpixel_window: 5
    crop_padding: 12

decision:
  mode: "all_detectors_must_pass"
  important_detectors:
    - "999"
    - "102"
    - "305"
  max_ng_count: 0

detectors:
  "999":
    enabled: true
    display_name: "Dark / bright blob detector"
    params:
      threshold: 45
      min_area: 20
      max_area: 5000
      blur_size: 3
      invert: false
      clahe_enabled: true

  "102":
    enabled: false
    display_name: "Scratch / thin line detector"
    params:
      canny_low: 30
      canny_high: 120
      min_length: 50
      max_width: 8
      morphology_kernel: 3
      blur_size: 3
      clahe_enabled: true

  "305":
    enabled: false
    display_name: "Brightness / uniformity detector"
    params:
      mean_min: 20
      mean_max: 235
      std_max: 60
      percentile_low: 1
      percentile_high: 99
      cell_size: 128

output:
  save_overlay: true
  save_ng_tiles: true
  save_csv: true
  save_json: true
