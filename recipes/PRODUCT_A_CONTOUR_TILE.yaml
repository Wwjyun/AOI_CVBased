recipe_name: "PRODUCT_A_CONTOUR_TILE"
product_id: "PRODUCT_A"
machine_id: "AOI_01"
version: "0.1.0"

tile:
  mode: "contour"
  threshold:
    method: "adaptive_gaussian"  # global, otsu, adaptive_mean, adaptive_gaussian
    threshold: 128
    max_value: 255
    invert: true
    adaptive_block_size: 31
    adaptive_c: 5
    blur_size: 3
    morph_open_kernel: 3
    morph_open_iterations: 1
    morph_close_kernel: 3
    morph_close_iterations: 1
  shapes:
    enabled_shapes:
      - "rectangle"
      - "circle"
      - "polygon"
    min_area: 100
    max_area: 200000
    min_width: 10
    max_width: 1000
    min_height: 10
    max_height: 1000
    min_aspect_ratio: 0
    max_aspect_ratio: 20
    min_radius: 5
    max_radius: 500
    min_circularity: 0.75
    polygon_min_vertices: 3
    polygon_max_vertices: 12
    approx_epsilon_ratio: 0.02
    subpixel_enabled: true
    subpixel_window: 5
    crop_padding: 8

decision:
  mode: "all_detectors_must_pass"
  important_detectors:
    - "999"
  max_ng_count: 0

detectors:
  "999":
    enabled: true
    display_name: "Dark / bright blob detector"
    params:
      threshold: 45
      min_area: 20
      max_area: 5000
      blur_size: 3
      invert: false
      clahe_enabled: true

output:
  save_overlay: true
  save_ng_tiles: true
  save_csv: true
  save_json: true
